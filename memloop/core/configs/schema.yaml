# MemLoop unified config schema
# Every configured run should be invokable with a single config file conforming to this schema.
# Per the MemLoop config-schema design.
#
# The runner validates the loaded config against this schema. Validation
# failures (especially the FORBIDDEN_KEYS checks) MUST abort execution loudly.

config_schema_version: "v4.0.0"

required_fields:
  - run_id              # unique stable run identifier
  - dataset             # one of: own_full | erag_50m | erag_100m | erag_150m | erag_250m
  - method              # one of the configured baseline or MemLoop methods
  - seed                # query-order seed (positive integer)
  - models              # {hierarchy_low: <alias>, hierarchy_high: <alias>, answer: <alias>, judge: <alias>}
  - paths               # {corpus, queries, chroma, output, manifest}
  - tokenizer           # name + version (e.g., cl100k_base + tiktoken 0.13.0)

optional_fields:
  - promotion           # state machine config
  - decay               # decay window, tau, budget
  - dual_index          # only required for methods that use the dual index
  - notes               # free-form

# === ISOLATION CHECK ===
# Per the MemLoop config-isolation policy.
# The runner MUST reject any config containing these keys/values:

FORBIDDEN_KEYS:
  - "governance"
  - "rbac"
  - "memory_access"
  - "access_label"
  - "deterministic_access_comparison"
  - "redaction_accuracy"
  - "over_refusal"
  - "allow_redact_refuse"
  - "evermemos"
  - "solution1"
  - "max_docs"
  - "max_queries"
  - "n_evidence_max"
  - "first_n"
  - "subset"
  - "limit_queries"
  - "limit_docs"
  - "sample_queries"
  - "random_query_subsample"
  - "skip_failed_queries"

FORBIDDEN_DATASETS:
  - "locomo"
  - "locomo_plus"
  - "locomo10"
  - "own_memloop_subset"
  - "erag_subset"

# Promotion config
promotion_schema:
  required:
    - score_weights         # {w1..w5} for relevance / uncertainty / EIG / hist_utility / detail_cost
    - decision_mode         # "llm" | "fixed_threshold"
    - promotion_budget      # max simultaneously-PROMOTED nodes
  optional:
    - decision_log_path     # where to dump structured promotion decisions

decay_schema:
  required:
    - tau                   # recency time constant (queries)
    - decay_window          # number of queries without use before demote
    - utility_floor         # if utility < this, demote
  optional:
    - precompute_baseline   # offline-only utility computation
