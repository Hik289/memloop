# MemLoop model aliases
# Per the MemLoop model-routing design.
#
# Resolution policy: each alias maps to exactly one provider/model identifier
# that has been smoke-tested. If a required alias is missing or its provider is
# unavailable, the runner MUST fail loudly — NEVER silently fall back to a
# different family of model.
#
# Keep smoke-test results with the run outputs for the project that uses this config.

aliases:
  gpt_5_4_mini:
    provider: azure
    endpoint_env: "AZURE_OPENAI_ENDPOINT"
    deployment: "gpt-5.4-mini"
    api_version: "2024-12-01-preview"
    api_key_env: "AZURE_LLM_API_KEY"
    chat_param_quirk: "max_completion_tokens"
    family: "OpenAI gpt-5.4-mini (Azure)"
    alias_status: "CONFIRMED"
    smoke_test_pass: true
    notes: "Reasoning model. Cannot set temperature != 1.0. Use max_completion_tokens instead of max_tokens."

  gpt_5_4_azure:
    provider: azure
    endpoint_env: "AZURE_OPENAI_ENDPOINT"
    deployment: "gpt-5.4"
    api_version: "2024-12-01-preview"
    api_key_env: "AZURE_LLM_API_KEY"
    chat_param_quirk: "max_completion_tokens"
    family: "OpenAI gpt-5.4 (Azure)"
    alias_status: "CONFIRMED"
    smoke_test_pass: false
    notes: "Full model via Azure. Same endpoint as mini. Added 2026-07-04 for B1 pilot."

  gpt_5_4:
    provider: bedrock_responses
    endpoint: "https://bedrock-mantle.us-east-2.api.aws/openai/v1/responses"
    model_id: "openai.gpt-5.4"
    api_key_env: "AWS_BEDROCK_API_KEY"   # Bearer token auth
    chat_param_quirk: "responses_api"     # OpenAI /responses format
    min_max_output_tokens: 16             # MUST be >= 16
    family: "OpenAI gpt-5.4 (Bedrock bedrock-mantle us-east-2)"
    smoke_test_pass: true
    alias_status: "CONFIRMED"
    notes: |
      Bedrock /responses API.
      Input: {model, input, max_output_tokens}
      Output: response.output[*].content[*].text where type=output_text

# Embedding alias. Local sentence-transformers is the default development backend.
embedding:
  provider: local
  model: "sentence-transformers/all-MiniLM-L6-v2"
  dim: 384
  notes: "Use an API-backed embedding deployment by overriding MEMLOOP_EMBED_* variables."

# Strict bans (READ ME): the runner MUST refuse to operate if any of these
# providers are referenced. Per the MemLoop model-routing policy.
forbidden_providers:
  - "gemini"        # keep provider routing explicit
  - "openai_public" # bypassing Azure tenancy

# Strict bans on substitution for gpt_5_4:
# Model substitutions must be explicit; silent fallback to a weaker model is not allowed.
gpt_5_4_substitution_policy:
  - rule: "Any reference to alias `gpt_5_4` MUST resolve to a real chat model."
  - rule: "If the alias has `provider: UNRESOLVED`, code MUST raise RuntimeError, not silently fall back to gpt-5.4-mini or gpt-4o*."
  - rule: "Substitutions require an explicit `gpt_5_4_substitute` alias and explicit release approval."

