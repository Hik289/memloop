name: Bug report
description: Report a reproducible MemLoop issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, inputs, and minimal files needed to reproduce the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, MemLoop version, install command, and `memloop doctor` output.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact credentials, private documents, generated answers, and customer data.
      render: text
